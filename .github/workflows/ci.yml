name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI with Static Analysis
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Step 3: Install project dependencies and plugin
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest pytest-cov flake8 pylint mypy

      # Step 4: Static analysis with flake8
      - name: Run flake8 static analysis
        run: |
          flake8 mkdocs_cdoc tests --select=E9,F63,F7,F82 --show-source --statistics

      # Step 5: Static analysis with pylint
      - name: Run pylint static analysis
        run: |
          pylint mkdocs_cdoc --errors-only

      # Step 6: Run unit and integration tests
      - name: Run pytest tests
        run: |
          pytest tests/ -v
